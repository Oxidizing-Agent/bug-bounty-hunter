# weekly-recon.yml
name: Weekly Recon Pipeline
on:
  schedule:
    - cron: '30 18 * * 5'
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch domains from domains branch
        run: |
          git fetch origin domains 2>/dev/null || true
          git checkout origin/domains -- domains.txt 2>/dev/null || true
          if [ ! -s domains.txt ]; then
            echo "No domains branch found, using main branch domains.txt"
          fi
          echo "Domains loaded: $(wc -l < domains.txt)"

      - name: Filter and split domains
        id: split
        run: |
          grep -vEi "^#|^$" domains.txt | \
          grep -vEi "google\.|microsoft\.|apple\.|amazon\.|facebook\.|meta\.|twitter\.|netflix\.|linkedin\.|github\." | \
          grep -v '^\*\.' | \
          sort -u > domains_clean.txt || true

          total=$(wc -l < domains_clean.txt)
          num_batches=$(( (total + 49) / 50 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT
          echo "Original: $(wc -l < domains.txt), Clean: $total, Batches: $num_batches"

      - name: Upload clean domains
        uses: actions/upload-artifact@v4
        with:
          name: domains-clean
          path: domains_clean.txt

  discover:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Install tools
        run: |
          go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install github.com/projectdiscovery/dnsx/cmd/dnsx@latest
          go install github.com/PentestPad/subzy@latest

      - name: Download clean domains
        uses: actions/download-artifact@v4
        with:
          name: domains-clean

      - name: Run subfinder on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 50 + 1 ))
          sed -n "${start},$((start + 49))p" domains_clean.txt > batch_domains.txt
          echo "Batch ${{ matrix.batch }}: $(wc -l < batch_domains.txt) domains"

          subfinder -dL batch_domains.txt \
            -silent \
            -timeout 30 \
            -t 10 \
            -max-time 300 \
            -o subs_passive.txt || true

          echo "Passive subdomains: $(wc -l < subs_passive.txt 2>/dev/null || echo 0)"

      - name: Run dnsx bruteforce on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          curl -sL "https://raw.githubusercontent.com/danielmiessler/SecLists/master/Discovery/DNS/subdomains-top1million-5000.txt" \
            -o wordlist.txt || true

          start=$(( (${{ matrix.batch }} - 1) * 50 + 1 ))
          sed -n "${start},$((start + 49))p" domains_clean.txt > batch_domains.txt

          > subs_active.txt
          while IFS= read -r domain; do
            dnsx -d "$domain" \
              -w wordlist.txt \
              -silent \
              -resp-only \
              -t 50 \
              >> subs_active.txt || true
          done < batch_domains.txt

          echo "Active subdomains: $(wc -l < subs_active.txt 2>/dev/null || echo 0)"

      - name: Merge passive and active results
        run: |
          cat subs_passive.txt subs_active.txt 2>/dev/null | \
            grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' | \
            grep -v '^\*\.' | \
            grep -vE '^[a-f0-9]{32}\.' | \
            grep -vE '\.(png|jpg|gif|css|js)$' | \
            grep -vE 'cust\.' | \
            grep -vE '^ua-[0-9]' | \
            grep -vE '[0-9]{1,3}-[0-9]{1,3}-[0-9]{1,3}-[0-9]{1,3}' | \
            grep -vE '^(ns|mail|smtp|pop|imap|ftp|vpn|server|node|host)[0-9]+\.' | \
            sort -u | head -5000 > batch_subs.txt || true

          echo "Batch ${{ matrix.batch }} total subdomains: $(wc -l < batch_subs.txt)"

      - name: Run subzy on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          touch takeover_batch.txt

          if [ -s batch_subs.txt ]; then
            subzy run \
              --targets batch_subs.txt \
              --hide_fails \
              --verify_ssl \
              --timeout 10 \
              --concurrency 20 \
              > subzy_raw.txt 2>/dev/null || true

            echo "=== SUBZY RAW OUTPUT ==="
            cat subzy_raw.txt || true
            echo "========================"
            grep "\[ VULNERABLE \]" subzy_raw.txt > takeover_batch.txt || true
          fi

          echo "Takeover candidates in batch ${{ matrix.batch }}: $(wc -l < takeover_batch.txt)"

      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: subs-batch-${{ matrix.batch }}
          path: |
            batch_subs.txt
            takeover_batch.txt
          if-no-files-found: warn

  combine_and_probe:
    needs: [prepare, discover]
    runs-on: ubuntu-latest
    timeout-minutes: 350
    if: ${{ always() && needs.prepare.result == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install tools
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest

      - name: Download all subdomain artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_subs
          pattern: subs-batch-*

      - name: Combine and deduplicate subdomains
        run: |
          find all_subs -name "batch_subs.txt" | xargs cat 2>/dev/null | \
            sort -u | \
            grep -v '^\*\.' | \
            grep -vE '^[0-9]{1,3}\.[0-9]' | \
            grep -vE '^[a-f0-9]{32}\.' > all_subdomains_new.txt || true

          echo "Total unique subdomains this week: $(wc -l < all_subdomains_new.txt)"

      - name: Combine takeover results
        run: |
          find all_subs -name "takeover_batch.txt" | \
            xargs cat 2>/dev/null | \
            sort -u > takeover_candidates.txt || true

          count=$(wc -l < takeover_candidates.txt)
          echo "Total takeover candidates: $count"
          echo "takeover_count=$count" >> $GITHUB_ENV

      # ── NEW ASSET DIFF ──────────────────────────────────────────
      - name: Diff new subdomains
        run: |
          if [ -f all_subdomains_clean.txt ] && [ -s all_subdomains_clean.txt ]; then
            comm -23 \
              <(sort all_subdomains_new.txt) \
              <(sort all_subdomains_clean.txt) \
              > new_subdomains.txt || true
          else
            cp all_subdomains_new.txt new_subdomains.txt || true
          fi

          echo "New subdomains this week: $(wc -l < new_subdomains.txt)"
          cp all_subdomains_new.txt all_subdomains_clean.txt

      # ── HTTPX: probe all subdomains ──────────────────────────────
      - name: Run httpx on all subdomains
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          httpx -l all_subdomains_clean.txt \
            -silent \
            -timeout 8 \
            -retries 0 \
            -rl 50 \
            -threads 50 \
            -mc 200,201,301,302,303,401,403,404,405,500 \
            -title \
            -status-code \
            -tech-detect \
            -no-color \
            -o httpx_full.txt || true

          awk '{print $1}' httpx_full.txt | sort -u > live_hosts_all.txt

          grep -E '\[200\]|\[201\]|\[301\]|\[302\]|\[303\]|\[401\]|\[403\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts.txt || true

          grep '\[403\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts_403.txt || true

          grep '\[404\]' httpx_full.txt | \
            awk '{print $1}' | sort -u > live_hosts_404.txt || true

          echo "=== FINAL COUNTS ==="
          echo "Main targets: $(wc -l < live_hosts.txt)"
          echo "403 targets: $(wc -l < live_hosts_403.txt)"
          echo "404 targets: $(wc -l < live_hosts_404.txt)"

      # ── HTTPX: probe new subdomains separately ───────────────────
      - name: Run httpx on new subdomains
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin

          touch new_live_hosts.txt

          if [ -s new_subdomains.txt ]; then
            httpx -l new_subdomains.txt \
              -silent \
              -timeout 8 \
              -retries 0 \
              -rl 50 \
              -threads 50 \
              -mc 200,201,301,302,303,401,403,404,405,500 \
              -status-code \
              -no-color \
              -o httpx_new.txt || true

            awk '{print $1}' httpx_new.txt | sort -u > new_live_hosts.txt || true
            echo "New live hosts: $(wc -l < new_live_hosts.txt)"
          else
            echo "No new subdomains this week"
          fi

      - name: Commit results
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add \
            live_hosts.txt \
            live_hosts_403.txt \
            live_hosts_404.txt \
            all_subdomains_clean.txt \
            new_subdomains.txt \
            new_live_hosts.txt \
            takeover_candidates.txt
          git diff --staged --quiet || git commit -m "Weekly recon $(date +'%Y-%m-%d') - $(wc -l < live_hosts.txt) live | $(wc -l < new_subdomains.txt) new subs | ${{ env.takeover_count }} takeover candidates"
          git pull --rebase origin main || true
          git push

      # ── EMAIL: only if subzy found takeover candidates ───────────
      - name: Email takeover candidates
        if: env.takeover_count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
          subject: "[TAKEOVER] ${{ env.takeover_count }} Subdomain Takeover Candidate(s) Found"
          body: |
            Subzy found ${{ env.takeover_count }} subdomain takeover candidate(s).

            Check takeover_candidates.txt in your repo.

            Next steps:
            1. Open takeover_candidates.txt in your repo
            2. For each candidate run: dig CNAME <subdomain>
            3. Check if the service is unclaimed on can-i-take-over-xyz
            4. Verify manually before reporting
