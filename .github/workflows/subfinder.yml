name: Weekly Subdomain Discovery
on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:
jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      batches: ${{ steps.split.outputs.batches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Split domains into batches of 100
        id: split
        run: |
          total=$(wc -l < domains.txt)
          num_batches=$(( (total + 99) / 100 ))
          batches=$(seq 1 $num_batches | jq -R . | jq -sc .)
          echo "batches=$batches" >> $GITHUB_OUTPUT
  discover:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1
      - name: Install subfinder
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: go install github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
      - name: Run subfinder on batch
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          start=$(( (${{ matrix.batch }} - 1) * 100 + 1 ))
          sed -n "${start},$((start + 99))p" domains.txt > batch_domains.txt
          subfinder -dL batch_domains.txt -silent -timeout 30 -t 10 -max-time 350 -o subs_raw.txt || true
          grep -vP '^\d+[-\.]\d+[-\.]\d+[-\.]\d+\.' subs_raw.txt > batch_subs.txt || true
      - name: Upload batch results
        uses: actions/upload-artifact@v4
        with:
          name: subs-batch-${{ matrix.batch }}
          path: batch_subs.txt
  combine:
    needs: discover
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all_subs
      - name: Combine and deduplicate
        run: |
          cat all_subs/**/*.txt | sort -u > subdomains.txt
          echo "Total unique subdomains: $(wc -l < subdomains.txt)"
      - name: Commit subdomains
        run: |
          git config --global user.email "bugbountybot@github.com"
          git config --global user.name "BugBountyBot"
          git add subdomains.txt
          git diff --staged --quiet || git commit -m "Weekly subdomain update $(date +'%Y-%m-%d')"
          git push
