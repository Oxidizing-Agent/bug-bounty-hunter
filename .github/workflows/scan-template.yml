name: Scan Template Engine

on:
  workflow_call:
    inputs:
      scan_name:
        required: true
        type: string
      tags:
        required: false
        type: string
        default: ''
      severity:
        required: false
        type: string
        default: 'low,medium,high,critical'
      cron_info:
        required: false
        type: string
        default: ''
      use_katana:
        required: false
        type: boolean
        default: false
      httpx_flags:
        required: false
        type: string
        default: '-silent'
      nuclei_input:
        required: false
        type: string
        default: 'live_hosts'
    secrets:
      EMAIL_USER:
        required: true
      EMAIL_PASS:
        required: true
      EMAIL_TO:
        required: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Go tools
        uses: actions/cache@v4
        id: cache-tools
        with:
          path: ~/go/bin
          key: go-tools-${{ runner.os }}-v1

      - name: Install tools
        if: steps.cache-tools.outputs.cache-hit != 'true'
        run: |
          go install github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          go install github.com/projectdiscovery/katana/cmd/katana@latest

      - name: Download nuclei templates
       run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          mkdir -p $HOME/.local/share/nuclei-templates
          git clone --depth 1 https://github.com/projectdiscovery/nuclei-templates.git $HOME/.local/share/nuclei-templates || true
          echo "Templates ready: $(ls $HOME/.local/share/nuclei-templates | wc -l) folders"

      - name: Prepare input
        run: |
          if [ -f live_hosts.txt ] && [ -s live_hosts.txt ]; then
            cp live_hosts.txt input.txt
            echo "Using weekly live_hosts.txt"
          else
            cp domains.txt input.txt
            echo "Falling back to domains.txt"
          fi
          echo "Total targets: $(wc -l < input.txt)"

      - name: Run httpx (only if no live_hosts.txt)
        if: ${{ !hashFiles('live_hosts.txt') }}
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          httpx -l input.txt ${{ inputs.httpx_flags }} \
            -timeout 5 -retries 0 -rl 150 -threads 50 \
            -o live_hosts.txt || true
          cp live_hosts.txt input.txt
          echo "Live hosts: $(wc -l < input.txt)"

      - name: Run katana (if enabled)
        if: inputs.use_katana == true
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          katana -list input.txt -silent -js-crawl -depth 2 \
            -timeout 10 -o urls.txt || true

      - name: Run nuclei
        run: |
          export PATH=$PATH:$(go env GOPATH)/bin
          TEMPLATES_DIR="$HOME/.local/share/nuclei-templates"

          if [ "${{ inputs.nuclei_input }}" = "urls" ] && [ -f urls.txt ]; then
            INPUT_FILE="urls.txt"
          else
            INPUT_FILE="input.txt"
          fi

          TAGS_FLAG=""
          if [ -n "${{ inputs.tags }}" ]; then
            TAGS_FLAG="-tags ${{ inputs.tags }}"
          fi

          CUSTOM_FLAG=""
          if [ -d "custom-templates" ]; then
            CUSTOM_FLAG="-t custom-templates"
          fi

          timeout 21000 nuclei -l "$INPUT_FILE" \
            -t "$TEMPLATES_DIR" \
            $CUSTOM_FLAG \
            $TAGS_FLAG \
            -severity ${{ inputs.severity }} \
            -silent -retries 1 -timeout 8 \
            -bulk-size 100 -concurrency 100 \
            -o results.txt || true

      - name: Check for results
        id: check
        run: |
          if [ -s results.txt ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Send email
        if: steps.check.outputs.found == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USER }}
          password: ${{ secrets.EMAIL_PASS }}
          subject: "[${{ inputs.scan_name }}] Finding"
          body: file://results.txt
          to: ${{ secrets.EMAIL_TO }}
          from: BugBountyBot
